<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Interactive Teaching Platform{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}An interactive multimedia teaching platform with rich content exploration.{% endblock %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Header / Navbar -->
    <header class="site-header">
        <div class="header-inner container">
            <a href="{% url 'content:home' %}" class="brand">
                <i class="fa-solid fa-graduation-cap"></i>
                <span>TeachPlatform</span>
            </a>
            <nav class="header-nav">
                <a href="{% url 'content:home' %}"><i class="fa-solid fa-house"></i> Home</a>
                <a href="/admin/" target="_blank"><i class="fa-solid fa-gear"></i> Admin</a>
            </nav>
        </div>
    </header>

    <!-- Breadcrumb -->
    {% block breadcrumb %}{% endblock %}

    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Modal Overlay -->
    <div id="contentModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-box">
            <div class="modal-header">
                <h2 id="modalTitle" class="modal-title"></h2>
                <button class="modal-close" id="modalClose" aria-label="Close modal">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="modal-body" id="modalBody">
                <div class="modal-loading">
                    <div class="spinner"></div>
                    <p>Loading content...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="container">
            <p><i class="fa-solid fa-graduation-cap"></i> Interactive Teaching Platform &copy; 2025. Built with Django.</p>
        </div>
    </footer>

    <script src="{% static 'js/main.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
