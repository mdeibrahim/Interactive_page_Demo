{% extends 'base.html' %}
{% block title %}Password reset sent — Teaching Platform{% endblock %}
{% block content %}
<section class="container mx-auto my-12 max-w-lg">
    <div class="rounded-2xl border bg-white p-6 shadow">
        <h2 class="text-2xl font-bold">Check your email</h2>
        <p class="mt-2 text-sm text-slate-600">If an account with the provided email exists, you'll receive a password reset link shortly.</p>
        <p class="mt-4"><a href="{% url 'content:login' %}" class="font-semibold text-blue-700">Return to login</a></p>
    </div>
</section>
{% endblock %}
