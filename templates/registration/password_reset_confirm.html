{% extends 'base.html' %}
{% block title %}Set new password — Teaching Platform{% endblock %}
{% block content %}
<section class="container mx-auto my-12 max-w-lg">
    <div class="rounded-2xl border bg-white p-6 shadow">
        <h2 class="text-2xl font-bold">Set a new password</h2>
        <form method="post" class="mt-6 space-y-4">
            {% csrf_token %}
            {{ form.new_password1.label_tag }}
            {{ form.new_password1 }}
            {{ form.new_password2.label_tag }}
            {{ form.new_password2 }}
            <div>
                <button type="submit" class="inline-flex items-center gap-2 rounded-xl bg-gradient-to-r from-blue-600 to-cyan-600 px-4 py-2 font-semibold text-white">Set password</button>
            </div>
        </form>
    </div>
</section>
{% endblock %}
